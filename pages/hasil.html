<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil Evaluasi — Titik Arab</title>
  <link rel="icon" type="image/png" href="/img/tamov1.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Katibeh&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo+Play:wght@400;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/hasil.css">

  <style>
    /* ===== JAWABAN SECTION ===== */
    #jawaban-section { margin-top: 8px; margin-bottom: 8px; }

    .jawaban-level-card {
      background: #2E1F26;
      border: 1px solid #4A2D38;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 4px 18px #1A101428;
      animation: riseIn 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .jawaban-level-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
      gap: 12px;
    }
    .jawaban-level-header:hover { background: #3D2830; }

    .jawaban-level-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Karla", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #FBF3EA;
    }

    .jawaban-level-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .jwb-toggle-icon {
      color: #9B7888;
      font-size: 0.85rem;
      transition: transform 0.25s ease;
    }
    .jawaban-level-header.open .jwb-toggle-icon { transform: rotate(180deg); }

    .jawaban-level-body {
      display: none;
      padding: 0 20px 18px;
      border-top: 1px solid #4A2D3840;
    }
    .jawaban-level-body.open { display: block; }

    /* ── Per-soal item ── */
    .jawaban-item {
      padding: 12px 0;
      border-bottom: 1px solid #4A2D3830;
    }
    .jawaban-item:last-child { border-bottom: none; padding-bottom: 0; }

    .jawaban-item-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .jwb-num {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: #1A1014;
      border: 1px solid #4A2D38;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #9B7888;
      flex-shrink: 0;
      margin-top: 3px;
      font-family: "Karla", sans-serif;
    }

    .jwb-pertanyaan {
      font-family: "Amiri", serif;
      font-size: 1rem;
      direction: rtl;
      text-align: right;
      color: #C9B0BA;
      line-height: 1.8;
      flex: 1;
    }

    .jwb-jawaban-box {
      margin-top: 6px;
      margin-right: 32px;
      background: #1A101440;
      border: 1px solid #CB774030;
      border-left: 3px solid #CB7740;
      border-radius: 8px;
      padding: 8px 14px;
    }

    .jwb-jawaban-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #CB7740;
      font-family: "Karla", sans-serif;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .jwb-jawaban-text {
      font-family: "Amiri", serif;
      font-size: 1.05rem;
      direction: rtl;
      text-align: right;
      color: #FBF3EA;
      line-height: 1.9;
    }

    .jwb-jawaban-text.kosong {
      color: #6B4455;
      font-style: italic;
      font-family: "Karla", sans-serif;
      font-size: 0.85rem;
      direction: ltr;
      text-align: left;
    }

    /* Level color variants */
    .jwb-l1 .jawaban-level-icon { background: #CB774020; color: #CB7740; border: 1px solid #CB774035; }
    .jwb-l1 .jwb-jawaban-box    { border-left-color: #CB7740; }
    .jwb-l1 .jwb-jawaban-label  { color: #CB7740; }

    .jwb-l2 .jawaban-level-icon { background: #E8B84B20; color: #E8B84B; border: 1px solid #E8B84B35; }
    .jwb-l2 .jwb-jawaban-box    { border-left-color: #E8B84B; border: 1px solid #E8B84B30; border-left: 3px solid #E8B84B; }
    .jwb-l2 .jwb-jawaban-label  { color: #E8B84B; }

    .jwb-l3 .jawaban-level-icon { background: #7CC98A20; color: #7CC98A; border: 1px solid #7CC98A35; }
    .jwb-l3 .jwb-jawaban-box    { border-left-color: #7CC98A; border: 1px solid #7CC98A30; border-left: 3px solid #7CC98A; }
    .jwb-l3 .jwb-jawaban-label  { color: #7CC98A; }

    .jwb-l4 .jawaban-level-icon { background: #E0707020; color: #E07070; border: 1px solid #E0707035; }
    .jwb-l4 .jwb-jawaban-box    { border-left-color: #E07070; border: 1px solid #E0707030; border-left: 3px solid #E07070; }
    .jwb-l4 .jwb-jawaban-label  { color: #E07070; }

    /* empty state */
    .jwb-empty {
      text-align: center;
      padding: 28px 0;
      color: #6B4455;
      font-size: 0.85rem;
      font-family: "Karla", sans-serif;
    }
    .jwb-empty i { display: block; font-size: 1.8rem; margin-bottom: 8px; color: #4A2D38; }

    /* ===== PRINT STYLES ===== */
    @media print {
      html, body {
        background: white !important;
        color: #1A1014 !important;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        display: block !important;
        min-height: unset !important;
        overflow: visible !important;
      }

      body::before,
      body::after { display: none !important; }

      /* Sembunyikan elemen yang tidak perlu */
      #navbar,
      .hasil-actions,
      header .header-label,
      footer { display: none !important; }

      /* Header print-friendly */
      header {
        background: #f5ede0 !important;
        color: #1A1014 !important;
        padding: 20px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      header::before,
      header::after { display: none !important; }

      header h1 {
        font-size: 1.6rem !important;
        background: none !important;
        -webkit-text-fill-color: #1A1014 !important;
        color: #1A1014 !important;
      }

      header p { color: #5a4a50 !important; }

      main {
        max-width: 100% !important;
        padding: 0 12px !important;
      }

      .section-heading h2 { color: #1A1014 !important; }
      .section-heading::after { background: #d4c4a8 !important; }

      /* Skor akhir */
      #skor-akhir {
        background: #f5ede0 !important;
        border: 1.5px solid #d4c4a8 !important;
        box-shadow: none !important;
        color: #1A1014 !important;
        page-break-inside: avoid;
        break-inside: avoid;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      #skor-akhir::before,
      #skor-akhir::after { display: none !important; }
      .ring-score    { color: #1A1014 !important; }
      .ring-max      { color: #7A5C68 !important; }
      .skor-nama     { color: #1A1014 !important; }
      .skor-sub      { color: #7A5C68 !important; }
      .skor-ring-label { color: #7A5C68 !important; }
      .ring-track    { stroke: #d4c4a8 !important; }
      .stat-chip {
        background: #f5ede0 !important;
        border-color: #d4c4a8 !important;
        color: #3D2830 !important;
      }
      .grade-pill {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* ── Paksa SEMUA jawaban level terbuka saat print ── */
      .jawaban-level-body {
        display: block !important;
      }

      .jawaban-level-card {
        background: #f9f5f0 !important;
        border: 1px solid #d4c4a8 !important;
        box-shadow: none !important;
        page-break-inside: avoid;
        break-inside: avoid;
        margin-bottom: 10px !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .jawaban-level-header {
        background: #efe5d8 !important;
        color: #1A1014 !important;
        cursor: default !important;
      }

      .jawaban-level-title { color: #1A1014 !important; }
      .jwb-toggle-icon { display: none !important; }

      .jwb-num {
        background: #e8d9c0 !important;
        border-color: #d4c4a8 !important;
        color: #3D2830 !important;
      }

      .jwb-pertanyaan { color: #1A1014 !important; }

      .jwb-jawaban-box {
        background: #fff9f4 !important;
        border-color: #CB7740 !important;
      }

      .jwb-jawaban-label { color: #CB7740 !important; }
      .jwb-jawaban-text  { color: #1A1014 !important; }

      .jawaban-item {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* ── Level cards ── */
      .cards-grid {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }

      .level-card {
        background: #f9f5f0 !important;
        border: 1px solid #d4c4a8 !important;
        box-shadow: none !important;
        page-break-inside: avoid;
        break-inside: avoid;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .card-stripe,
      .level-icon,
      .card-progress,
      .card-progress-fill,
      .badge-level,
      .feedback-status {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .level-title  { color: #1A1014 !important; }
      .feedback-item { border-color: #e8d9c0 !important; color: #1A1014 !important; }
      .feedback-num { background: #e8d9c0 !important; border-color: #d4c4a8 !important; color: #3D2830 !important; }
      .feedback-note { color: #3D2830 !important; }
      .score-label   { color: #7A5C68 !important; }

      .score-number.high { color: #2a7a38 !important; }
      .score-number.med  { color: #A85C28 !important; }
      .score-number.low  { color: #b87a10 !important; }
      .score-number.vlow { color: #a04040 !important; }

      .feedback-status.correct { background: #e8f5eb !important; color: #2a7a38 !important; }
      .feedback-status.wrong   { background: #fde8e8 !important; color: #a04040 !important; }
      .feedback-item { page-break-inside: avoid; break-inside: avoid; }

      #ringkasan       { page-break-after: avoid; break-after: avoid; }
      #jawaban-section { page-break-before: avoid; break-before: avoid; }
      #detail-hasil    { page-break-before: auto; break-before: auto; }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- HEADER -->
  <header>
    <div class="header-label">
      <i class="bi bi-mortarboard-fill"></i>
      Titik Arab · Uji Kemampuan
    </div>
    <h1>Hasil Evaluasi</h1>
    <p>Ringkasan skor dan umpan balik dari setiap level</p>
  </header>

  <main>

    <!-- ===== SKOR AKHIR ===== -->
    <section id="ringkasan">
      <div class="section-heading">
        <h2><i class="bi bi-graph-up me-2"></i>Skor Akhir</h2>
      </div>

      <div id="skor-akhir">
        <div class="empty" style="padding:2rem">
          <i class="bi bi-hourglass-split"></i>
          <p>Memuat skor...</p>
        </div>
      </div>

      <div class="hasil-actions">
        <a id="btn-ulangi" href="maharah.html" class="btn-hasil primary">
          <i class="bi bi-arrow-repeat"></i> Ulangi Latihan
        </a>
        <button id="btn-cetak" class="btn-hasil outline">
          <i class="bi bi-printer"></i> Cetak Hasil
        </button>
      </div>
    </section>

    <!-- ===== JAWABAN KAMU ===== -->
    <!-- <section id="jawaban-section">
      <div class="section-heading">
        <h2><i class="bi bi-pencil-square me-2"></i>Jawaban Kamu</h2>
      </div>
      <div id="jawaban-container"></div>
    </section> -->

    <!-- ===== DETAIL PER LEVEL ===== -->
    <section id="detail-hasil">
      <div class="section-heading">
        <h2><i class="bi bi-list-check me-2"></i>Detail Per Level</h2>
      </div>

      <div id="hasil"></div>
      <div id="cards-grid" class="cards-grid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>
      Created with <i class="bi bi-heart-pulse-fill"></i>
      by
      <a href="https://www.instagram.com/titikarab/" target="_blank" rel="noopener">
        Titik Arab
      </a>
    </p>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/hasil.js"></script>


  <!-- ===== SCRIPT: CETAK HASIL ===== -->
  <script>
    // Override tombol cetak — buka semua accordion sebelum print,
    // tutup kembali setelah print selesai
    document.addEventListener("DOMContentLoaded", function () {
      const btnCetak = document.getElementById("btn-cetak");
      if (!btnCetak) return;

      btnCetak.addEventListener("click", function () {
        // Buka semua jawaban level
        document.querySelectorAll(".jawaban-level-body").forEach(function (body) {
          body.classList.add("open");
        });
        document.querySelectorAll(".jawaban-level-header").forEach(function (hdr) {
          hdr.classList.add("open");
        });

        // Tunggu render selesai lalu print
        setTimeout(function () {
          window.print();
        }, 150);
      });
    });
  </script>

  <!-- Load navbar -->
  <script>
    fetch("../pages/navbar.html")
      .then(r => r.text())
      .then(html => {
        const el = document.getElementById("navbar");
        if (el) el.innerHTML = html;

        window.toggleMobileNav = function () {
          const hamburger = document.getElementById('ta-hamburger');
          const drawer    = document.getElementById('ta-mobile-drawer');
          if (!hamburger || !drawer) return;
          const isOpen = drawer.classList.contains('open');
          hamburger.classList.toggle('open', !isOpen);
          drawer.classList.toggle('open', !isOpen);
        };

        const nav = document.getElementById('ta-navbar');
        if (nav) {
          window.addEventListener('scroll', function () {
            nav.classList.toggle('scrolled', window.scrollY > 40);
          }, { passive: true });
        }
      })
      .catch(() => {});
  </script>

</body>
</html>
