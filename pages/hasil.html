<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil Evaluasi — Titik Arab</title>
  <link rel="icon" type="image/png" href="/img/tamov1.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Katibeh&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo+Play:wght@400;600;700;800&family=Karla:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/hasil.css">

  <style>
    /* ===== JAWABAN SECTION ===== */
    #jawaban-section { margin-top: 8px; margin-bottom: 8px; }

    .jawaban-level-card {
      background: #2E1F26;
      border: 1px solid #4A2D38;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 4px 18px #1A101428;
      animation: riseIn 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .jawaban-level-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
      gap: 12px;
    }
    .jawaban-level-header:hover { background: #3D2830; }

    .jawaban-level-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Karla", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #FBF3EA;
    }

    .jawaban-level-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .jwb-toggle-icon {
      color: #9B7888;
      font-size: 0.85rem;
      transition: transform 0.25s ease;
    }
    .jawaban-level-header.open .jwb-toggle-icon { transform: rotate(180deg); }

    .jawaban-level-body {
      display: none;
      padding: 0 20px 18px;
      border-top: 1px solid #4A2D3840;
    }
    .jawaban-level-body.open { display: block; }

    /* ── Per-soal item ── */
    .jawaban-item {
      padding: 12px 0;
      border-bottom: 1px solid #4A2D3830;
    }
    .jawaban-item:last-child { border-bottom: none; padding-bottom: 0; }

    .jawaban-item-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .jwb-num {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: #1A1014;
      border: 1px solid #4A2D38;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #9B7888;
      flex-shrink: 0;
      margin-top: 3px;
      font-family: "Karla", sans-serif;
    }

    .jwb-pertanyaan {
      font-family: "Amiri", serif;
      font-size: 1rem;
      direction: rtl;
      text-align: right;
      color: #C9B0BA;
      line-height: 1.8;
      flex: 1;
    }

    .jwb-jawaban-box {
      margin-top: 6px;
      margin-right: 32px;
      background: #1A101440;
      border: 1px solid #CB774030;
      border-left: 3px solid #CB7740;
      border-radius: 8px;
      padding: 8px 14px;
    }

    .jwb-jawaban-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #CB7740;
      font-family: "Karla", sans-serif;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .jwb-jawaban-text {
      font-family: "Amiri", serif;
      font-size: 1.05rem;
      direction: rtl;
      text-align: right;
      color: #FBF3EA;
      line-height: 1.9;
    }

    .jwb-jawaban-text.kosong {
      color: #6B4455;
      font-style: italic;
      font-family: "Karla", sans-serif;
      font-size: 0.85rem;
      direction: ltr;
      text-align: left;
    }

    /* Level color variants */
    .jwb-l1 .jawaban-level-icon { background: #CB774020; color: #CB7740; border: 1px solid #CB774035; }
    .jwb-l1 .jwb-jawaban-box    { border-left-color: #CB7740; }
    .jwb-l1 .jwb-jawaban-label  { color: #CB7740; }

    .jwb-l2 .jawaban-level-icon { background: #E8B84B20; color: #E8B84B; border: 1px solid #E8B84B35; }
    .jwb-l2 .jwb-jawaban-box    { border-left-color: #E8B84B; border: 1px solid #E8B84B30; border-left: 3px solid #E8B84B; }
    .jwb-l2 .jwb-jawaban-label  { color: #E8B84B; }

    .jwb-l3 .jawaban-level-icon { background: #7CC98A20; color: #7CC98A; border: 1px solid #7CC98A35; }
    .jwb-l3 .jwb-jawaban-box    { border-left-color: #7CC98A; border: 1px solid #7CC98A30; border-left: 3px solid #7CC98A; }
    .jwb-l3 .jwb-jawaban-label  { color: #7CC98A; }

    .jwb-l4 .jawaban-level-icon { background: #E0707020; color: #E07070; border: 1px solid #E0707035; }
    .jwb-l4 .jwb-jawaban-box    { border-left-color: #E07070; border: 1px solid #E0707030; border-left: 3px solid #E07070; }
    .jwb-l4 .jwb-jawaban-label  { color: #E07070; }

    /* empty state */
    .jwb-empty {
      text-align: center;
      padding: 28px 0;
      color: #6B4455;
      font-size: 0.85rem;
      font-family: "Karla", sans-serif;
    }
    .jwb-empty i { display: block; font-size: 1.8rem; margin-bottom: 8px; color: #4A2D38; }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- HEADER -->
  <header>
    <div class="header-label">
      <i class="bi bi-mortarboard-fill"></i>
      Titik Arab · Uji Kemampuan
    </div>
    <h1>Hasil Evaluasi</h1>
    <p>Ringkasan skor dan umpan balik dari setiap level</p>
  </header>

  <main>

    <!-- ===== SKOR AKHIR ===== -->
    <section id="ringkasan">
      <div class="section-heading">
        <h2><i class="bi bi-graph-up me-2"></i>Skor Akhir</h2>
      </div>

      <div id="skor-akhir">
        <div class="empty" style="padding:2rem">
          <i class="bi bi-hourglass-split"></i>
          <p>Memuat skor...</p>
        </div>
      </div>

      <div class="hasil-actions">
        <a id="btn-ulangi" href="maharah.html" class="btn-hasil primary">
          <i class="bi bi-arrow-repeat"></i> Ulangi Latihan
        </a>
        <button id="btn-cetak" class="btn-hasil outline">
          <i class="bi bi-printer"></i> Cetak Hasil
        </button>
      </div>
    </section>

    <!-- ===== JAWABAN KAMU ===== -->
    <section id="jawaban-section">
      <div class="section-heading">
        <h2><i class="bi bi-pencil-square me-2"></i>Jawaban Kamu</h2>
      </div>
      <div id="jawaban-container"></div>
    </section>

    <!-- ===== DETAIL PER LEVEL ===== -->
    <section id="detail-hasil">
      <div class="section-heading">
        <h2><i class="bi bi-list-check me-2"></i>Detail Per Level</h2>
      </div>

      <div id="hasil"></div>
      <div id="cards-grid" class="cards-grid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>
      Created with <i class="bi bi-heart-pulse-fill"></i>
      by
      <a href="https://www.instagram.com/titikarab/" target="_blank" rel="noopener">
        Titik Arab
      </a>
    </p>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/hasil.js"></script>

  <!-- ===== SCRIPT: RENDER JAWABAN DARI SESSIONSTORAGE ===== -->
  <script>
    (function renderJawaban() {
      const container = document.getElementById("jawaban-container");
      if (!container) return;

      let rawData;
      try {
        rawData = JSON.parse(sessionStorage.getItem("semuaJawaban") || "[]");
      } catch (e) {
        rawData = [];
      }

      if (!rawData || rawData.length === 0) {
        container.innerHTML = `
          <div class="jwb-empty">
            <i class="bi bi-inbox"></i>
            <span>Jawaban tidak tersedia. Mungkin halaman direfresh?</span>
          </div>`;
        return;
      }

      // Kelompokkan per level
      const perLevel = {};
      rawData.forEach(item => {
        const lv = item.level || 1;
        if (!perLevel[lv]) perLevel[lv] = [];
        perLevel[lv].push(item);
      });

      const levelLabel = {
        1: "Level 1 — Novice Low–Mid",
        2: "Level 2 — Novice High–Intermediate Low",
        3: "Level 3 — Intermediate Mid",
        4: "Level 4 — Intermediate High"
      };
      const levelIcon = { 1: "bi-1-circle", 2: "bi-2-circle", 3: "bi-3-circle", 4: "bi-4-circle" };
      const colorClass = { 1: "jwb-l1", 2: "jwb-l2", 3: "jwb-l3", 4: "jwb-l4" };

      let html = "";
      Object.keys(perLevel).sort().forEach((lv, idx) => {
        const items = perLevel[lv];
        const lvInt = parseInt(lv);
        const cls   = colorClass[lvInt] || "jwb-l1";

        // Soal items
        let soalHTML = "";
        items.forEach((item, i) => {
          const jawaban = (item.jawaban || "").trim();
          const jawabanDisplay = jawaban
            ? `<div class="jwb-jawaban-text">${jawaban}</div>`
            : `<div class="jwb-jawaban-text kosong"><i class="bi bi-dash-circle me-1"></i>Tidak dijawab</div>`;

          soalHTML += `
            <div class="jawaban-item">
              <div class="jawaban-item-top">
                <div class="jwb-num">${i + 1}</div>
                <div class="jwb-pertanyaan">${item.pertanyaan || ""}</div>
              </div>
              <div class="jwb-jawaban-box">
                <div class="jwb-jawaban-label">
                  <i class="bi bi-pencil-fill"></i> Jawaban kamu
                </div>
                ${jawabanDisplay}
              </div>
            </div>`;
        });

        // Card level — default open untuk level 1, tertutup sisanya
        const isOpen = idx === 0 ? "open" : "";

        html += `
          <div class="jawaban-level-card ${cls}">
            <div class="jawaban-level-header ${isOpen}" onclick="toggleJawaban(this)">
              <div class="jawaban-level-title">
                <div class="jawaban-level-icon"><i class="bi ${levelIcon[lvInt] || 'bi-circle'}"></i></div>
                ${levelLabel[lvInt] || "Level " + lv}
                <span style="color:#6B4455;font-size:0.75rem;font-weight:500;">
                  (${items.length} soal)
                </span>
              </div>
              <i class="bi bi-chevron-down jwb-toggle-icon"></i>
            </div>
            <div class="jawaban-level-body ${isOpen}">
              ${soalHTML}
            </div>
          </div>`;
      });

      container.innerHTML = html;
    })();

    function toggleJawaban(header) {
      const body = header.nextElementSibling;
      header.classList.toggle("open");
      body.classList.toggle("open");
    }
  </script>

</body>
</html>
