<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uji Kemampuanmu</title>

  <link rel="icon" type="image/png" href="/img/tamov1.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Katibeh&family=Lugrasimo&family=Alyamama&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo+Play:wght@400;600;700&family=Karla:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/maharah.css">

  <!-- ✅ FIX NAVBAR: Definisikan toggleMobileNav SEBELUM navbar di-inject -->
  <!-- Ini memastikan fungsi sudah tersedia saat onclick="toggleMobileNav()" dipanggil -->
  <script>
    // Fungsi ini HARUS di head, sebelum navbar.html di-inject,
    // karena hamburger button punya onclick="toggleMobileNav()" inline.
    // Jika fungsi belum ada di window saat klik, browser lempar ReferenceError.
    window.toggleMobileNav = function () {
      const hamburger = document.getElementById('ta-hamburger');
      const drawer = document.getElementById('ta-mobile-drawer');
      if (!hamburger || !drawer) return;
      const isOpen = drawer.classList.contains('open');
      hamburger.classList.toggle('open', !isOpen);
      drawer.classList.toggle('open', !isOpen);
    };

    window.startOnboarding = function () {
      // placeholder — bisa diisi tour logic nanti
    };
  </script>
</head>

<body>

  <!-- Background decoration -->
  <div class="bg-decor">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- HEADER -->
  <div class="header-maharah">
    <div class="maskot-box">
      <img id="maskot" src="../img/maskot1.png" alt="Maskot">
      <p id="feedbackText">Siap latihan?</p>
    </div>

    <!-- Apersepsi overlay & popup -->
    <div id="apersepsiOverlay" class="apersepsi-overlay" style="display:none;"></div>
    <div id="apersepsiBox" class="apersepsi-box">
      <img id="maskotImg" src="/img/maskotceria.png" class="maskot-img" alt="Maskot">
      <div id="maskotText" class="maskot-text"></div>
      <div id="apersepsiOpsi" class="apersepsi-opsi"></div>
    </div>

    <div class="teks-info" style="margin-bottom: 1rem; opacity: 0.8;">
      <i class="bi bi-file-text me-2"></i>
      <span id="infoTeks">Latihan Teks 1</span>
    </div>

    <h1 id="judulLatihan"></h1>
    <h2 id="judulTeks"></h2>
  </div>

  <!-- MAIN WRAPPER -->
  <div class="quiz-wrapper">

    <!-- SIDEBAR -->
    <div class="quiz-sidebar">
      <div class="progress-box">

        <!-- Level counter -->
        <p id="progress-text">Level 1 dari 4</p>
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>

        <!-- Ornament -->
        <div class="ornament-divider"><span>❖</span></div>

        <!-- Level list -->
        <div class="level-list" id="level-list"></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="quiz-main">
      <div class="quiz-inner">

        <!-- INPUT NAMA -->
        <div id="inputNamaBox" class="input-box">
          <input type="text" id="namaUser" placeholder="Masukkan nama kamu">
          <button onclick="simpanNama()">
            <i class="bi bi-arrow-right-circle me-1"></i> Mulai
          </button>
        </div>

        <!-- QUIZ AREA -->
        <div id="quiz-area" style="display:none;">

          <!-- Arabic title -->
          <div class="arabic">
            <h2 id="judul"></h2>
          </div>

          <!-- QUIZ BOX -->
          <div class="quiz-box">

            <!-- Mini progress header -->
            <div class="quiz-header">
              <span id="soalCounter">
                <i class="bi bi-list-check me-1"></i>Soal 1 dari 10
              </span>
              <div class="progress-mini">
                <div id="progress-mini-fill"></div>
              </div>
            </div>

            <!-- Scrollable quiz content -->
            <div class="soal-scroll">
              <div id="quiz-container"></div>
            </div>
          </div>

          <!-- ACTION BUTTONS -->
          <div class="action">
            <button id="btn-aksi">
              Lanjut <i class="bi bi-chevron-left ms-1"></i>
            </button>
          </div>

          <!-- HASIL -->
          <h3 id="judulHasil" style="display:none;">
            <i class="bi bi-patch-check me-2"></i>Hasil Penilaian
          </h3>
          <div id="hasil"></div>

        </div>
      </div>
    </div>

  </div><!-- end .quiz-wrapper -->

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script/maharah.js"></script>

  <!-- ✅ FIX: Load navbar SETELAH maharah.js, dengan callback yang benar -->
  <script>
    // Muat navbar.html via fetch, lalu pastikan scroll handler aktif
    fetch("../pages/navbar.html")
      .then(res => res.text())
      .then(html => {
        const el = document.getElementById("navbar");
        if (!el) return;
        el.innerHTML = html;

        // Jalankan script yang ada di dalam navbar.html
        // (navbar.html punya <script> tag di dalamnya — perlu di-eval ulang)
        el.querySelectorAll("script").forEach(oldScript => {
          const newScript = document.createElement("script");
          newScript.textContent = oldScript.textContent;
          document.head.appendChild(newScript);
        });

        // Pastikan toggleMobileNav selalu mengacu elemen yang sudah ada di DOM
        window.toggleMobileNav = function () {
          const hamburger = document.getElementById('ta-hamburger');
          const drawer = document.getElementById('ta-mobile-drawer');
          if (!hamburger || !drawer) return;
          const isOpen = drawer.classList.contains('open');
          hamburger.classList.toggle('open', !isOpen);
          drawer.classList.toggle('open', !isOpen);
        };

        // Scroll effect untuk navbar
        const nav = document.getElementById('ta-navbar');
        if (nav) {
          window.addEventListener('scroll', function () {
            if (window.scrollY > 40) {
              nav.classList.add('scrolled');
            } else {
              nav.classList.remove('scrolled');
            }
          }, { passive: true });
        }

        // Tutup drawer saat klik link mobile
        document.querySelectorAll('.ta-mobile-links a').forEach(function (a) {
          a.addEventListener('click', function () {
            document.getElementById('ta-hamburger')?.classList.remove('open');
            document.getElementById('ta-mobile-drawer')?.classList.remove('open');
          });
        });
      })
      .catch(err => console.error("Gagal load navbar:", err));
  </script>

</body>

</html>
