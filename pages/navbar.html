<!--
  NAVBAR.HTML — TIKAR / Titik Arab — REDESIGN 2026
  Aesthetic: Academic Garden — Clean · Airy · Warm
  Warna: Teal (#2A6B6B) × Coral (#E07B62) × Warm White
-->

<style>
  /* ===== NAVBAR DESIGN TOKENS ===== */
  :root {
    --nav-teal: #2A6B6B;
    --nav-teal-dark: #1D5050;
    --nav-teal-mid: #468E8E;
    --nav-teal-light: #78BBBB;
    --nav-teal-pale: #C4E4E4;
    --nav-teal-wash: #EAF5F5;
    --nav-coral: #E07B62;
    --nav-bg: #FFFFFF;
    --nav-text: #1C2626;
    --nav-text-mid: #3D5252;
    --nav-text-muted: #6B8A8A;
    --nav-border: #EDE8E2;
    --nav-shadow: 0 2px 20px rgba(28, 38, 38, 0.07);
  }

  /* ===== NAVBAR BASE ===== */
  .ta-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 32px;
    background: rgba(255, 255, 255, 0.95);
    border-bottom: 1px solid var(--nav-border);
    box-shadow: var(--nav-shadow);
    transition: all 0.32s ease;
    /* Tidak pakai backdrop-filter agar sticky child tidak rusak */
  }

  /* Teal top accent bar */
  .ta-navbar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg,
        var(--nav-teal-dark) 0%,
        var(--nav-teal) 40%,
        var(--nav-coral) 70%,
        var(--nav-teal-light) 100%);
  }

  /* Scrolled: sedikit lebih gelap */
  .ta-navbar.scrolled {
    background: rgba(255, 255, 255, 0.98) !important;
    box-shadow: 0 4px 28px rgba(28, 38, 38, 0.10) !important;
  }

  /* ===== BRAND ===== */
  .ta-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .ta-brand img {
    height: 34px;
    width: auto;
    transition: transform 0.3s ease;
  }

  .ta-brand:hover img {
    transform: rotate(-6deg) scale(1.08);
  }

  .ta-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .ta-brand-name {
    font-family: "Nunito", "Plus Jakarta Sans", sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--nav-text);
    letter-spacing: -0.03em;
  }

  .ta-brand-name span {
    color: var(--nav-coral);
  }

  .ta-brand-tagline {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--nav-text-muted);
    margin-top: 2px;
  }

  /* ===== SPACER ===== */
  .ta-spacer {
    flex: 1;
  }

  /* ===== DESKTOP NAV LINKS ===== */
  .ta-nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .ta-nav-links li a {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 10px;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 0.87rem;
    font-weight: 600;
    color: var(--nav-text-mid);
    text-decoration: none;
    transition: all 0.2s ease;
    position: relative;
    letter-spacing: 0.01em;
  }

  .ta-nav-links li a i {
    font-size: 0.78rem;
    color: var(--nav-teal-mid);
    opacity: 0.8;
  }

  .ta-nav-links li a:hover {
    color: var(--nav-teal);
    background: var(--nav-teal-wash);
  }

  .ta-nav-links li a:hover i {
    opacity: 1;
  }

  /* Active state */
  .ta-nav-links li a.active {
    color: var(--nav-teal);
    background: var(--nav-teal-wash);
    font-weight: 700;
  }

  /* Animated underline dot */
  .ta-nav-links li a.active::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--nav-coral);
  }

  /* CTA button */
  .ta-nav-links li a.nav-cta {
    background: var(--nav-teal);
    color: white !important;
    font-weight: 700;
    padding: 8px 18px;
    box-shadow: 0 4px 14px rgba(42, 107, 107, 0.28);
    border-radius: 999px;
    margin-left: 6px;
  }

  .ta-nav-links li a.nav-cta i {
    color: white !important;
    opacity: 1;
  }

  .ta-nav-links li a.nav-cta:hover {
    background: var(--nav-teal-dark) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(42, 107, 107, 0.36) !important;
    color: white !important;
  }

  .ta-nav-links li a.nav-cta.active::after {
    display: none;
  }

  /* ===== TOUR BUTTON ===== */
  .ta-tour-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 10px;
    padding: 7px 14px;
    border-radius: 10px;
    background: var(--nav-teal-wash);
    border: 1.5px solid var(--nav-teal-pale);
    color: var(--nav-teal);
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .ta-tour-btn i {
    font-size: 0.8rem;
    color: var(--nav-teal);
  }

  .ta-tour-btn:hover {
    background: var(--nav-teal);
    color: white;
    border-color: var(--nav-teal);
  }

  .ta-tour-btn:hover i {
    color: white;
  }

  /* ===== HAMBURGER ===== */
  .ta-hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--r-sm, 10px);
    background: var(--nav-teal-wash);
    border: 1.5px solid var(--nav-teal-pale);
    transition: all 0.2s;
  }

  .ta-hamburger:hover {
    background: var(--nav-teal);
    border-color: var(--nav-teal);
  }

  .ta-hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--nav-teal);
    border-radius: 999px;
    transition: all 0.3s ease;
  }

  .ta-hamburger:hover span {
    background: white;
  }

  /* ===== MOBILE DRAWER ===== */
  .ta-mobile-drawer {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: #FFFFFF;
    border-bottom: 1.5px solid var(--nav-border);
    padding: 20px 24px 28px;
    box-shadow: 0 12px 40px rgba(28, 38, 38, 0.10);
    transform: translateY(-10px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
    pointer-events: none;
    z-index: 999;
  }

  .ta-mobile-drawer.open {
    display: block;
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .ta-mobile-links {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ta-mobile-links li a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border-radius: 12px;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--nav-text-mid);
    text-decoration: none;
    transition: all 0.18s ease;
  }

  .ta-mobile-links li a i {
    width: 20px;
    text-align: center;
    font-size: 0.9rem;
    color: var(--nav-teal-mid);
  }

  .ta-mobile-links li a:hover,
  .ta-mobile-links li a.active {
    background: var(--nav-teal-wash);
    color: var(--nav-teal);
  }

  .ta-mobile-links li a:hover i,
  .ta-mobile-links li a.active i {
    color: var(--nav-teal);
  }

  .ta-mobile-divider {
    height: 1px;
    background: var(--nav-border);
    margin: 12px 0;
  }

  .ta-mobile-cta {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }

  .ta-mobile-cta a {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 12px;
    border-radius: 14px;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
  }

  .ta-mobile-cta .cta-primary {
    background: var(--nav-teal);
    color: white;
    box-shadow: 0 4px 14px rgba(42, 107, 107, 0.3);
  }

  .ta-mobile-cta .cta-primary:hover {
    background: var(--nav-teal-dark);
    transform: translateY(-2px);
  }

  .ta-mobile-cta .cta-tour {
    background: var(--nav-teal-wash);
    border: 1.5px solid var(--nav-teal-pale);
    color: var(--nav-teal);
  }

  .ta-mobile-cta .cta-tour:hover {
    background: var(--nav-teal);
    color: white;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {

    .ta-nav-links,
    .ta-tour-btn {
      display: none;
    }

    .ta-hamburger {
      display: flex;
    }
  }

  @media (max-width: 400px) {
    .ta-navbar {
      padding: 0 16px;
    }

    .ta-brand-tagline {
      display: none;
    }
  }
</style>

<!-- NAVBAR MARKUP -->
<nav class="ta-navbar" id="ta-navbar">

  <!-- Brand -->
  <a class="ta-brand" href="/index.html">
    <img src="/img/tamov1.png" alt="Titik Arab logo">
    <div class="ta-brand-text">
      <span class="ta-brand-name">titik<span>.</span>arab</span>
      <span class="ta-brand-tagline">Belajar Arab Mudah</span>
    </div>
  </a>

  <div class="ta-spacer"></div>

  <!-- Desktop nav links -->
  <ul class="ta-nav-links">
    <li><a href="/index.html" id="nav-home"><i class="bi bi-house-fill"></i> Home</a></li>

    <li><a href="/index.html#tentang"><i class="bi bi-info-circle-fill"></i> Tentang</a></li>

    <li><a href="/index.html#bacaan"><i class="bi bi-book-fill"></i> Bacaan</a></li>

    <li><a href="/pages/tim.html"><i class="bi bi-people-fill"></i> Tim</a></li>

    <li><a href="/index.html#kontak"><i class="bi bi-envelope-fill"></i> Kontak</a></li>

    <li><a href="/index.html#bacaan" class="nav-cta"><i class="bi bi-lightning-fill"></i> Mulai Belajar</a></li>
  </ul>

  <!-- Tour button -->
  <button class="ta-tour-btn" onclick="startOnboarding()" title="Tur panduan website">
    <i class="bi bi-map-fill"></i> Panduan
  </button>

  <!-- Hamburger (mobile) -->
  <div class="ta-hamburger" id="ta-hamburger" onclick="toggleMobileNav()" role="button" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<!-- Mobile drawer -->
<div class="ta-mobile-drawer" id="ta-mobile-drawer">
  <ul class="ta-mobile-links">
    <li><a href="/index.html"><i class="bi bi-house-fill"></i> Home</a></li>
    <li><a href="/index.html#tentang"><i class="bi bi-info-circle-fill"></i> Tentang</a></li>
    <li><a href="/index.html#bacaan"><i class="bi bi-book-fill"></i> Bacaan</a></li>
    <li><a href="/index.html#kontak"><i class="bi bi-envelope-fill"></i> Kontak</a></li>
  </ul>
  <div class="ta-mobile-divider"></div>
  <div class="ta-mobile-cta">
    <a href="/index.html#bacaan" class="cta-primary">
      <i class="bi bi-lightning-fill"></i> Mulai Belajar
    </a>
    <a href="#" class="cta-tour" onclick="startOnboarding(); toggleMobileNav(); return false;">
      <i class="bi bi-map-fill"></i> Panduan
    </a>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const nav = document.getElementById('ta-navbar');
    if (!nav) return;

    // ── Scroll effect ──
    window.addEventListener('scroll', function () {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    // ── Mobile toggle ──
    window.toggleMobileNav = function () {
      const hamburger = document.getElementById('ta-hamburger');
      const drawer = document.getElementById('ta-mobile-drawer');
      if (!hamburger || !drawer) return;
      const isOpen = drawer.classList.contains('open');
      hamburger.classList.toggle('open', !isOpen);
      drawer.classList.toggle('open', !isOpen);
    };

    // ── Close drawer on link click ──
    document.querySelectorAll('.ta-mobile-links a').forEach(function (a) {
      a.addEventListener('click', function () {
        document.getElementById('ta-hamburger')?.classList.remove('open');
        document.getElementById('ta-mobile-drawer')?.classList.remove('open');
      });
    });

    // ── Active link highlight ──
    const currentPath = window.location.pathname + window.location.hash;
    document.querySelectorAll('.ta-nav-links a, .ta-mobile-links a').forEach(function (a) {
      const href = a.getAttribute('href');
      if (
        href &&
        (href === currentPath ||
          (href === '/index.html' && window.location.pathname === '/'))
      ) {
        a.classList.add('active');
      }
    });
  });
</script>
