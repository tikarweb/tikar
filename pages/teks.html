<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Arab</title>
    <link rel="icon" type="image/png" href="../img/tamov1.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Alyamama&family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo+Play:wght@400;600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/teks.css">
</head>
<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- FLOATING DECO -->
    <div class="page-deco" aria-hidden="true">
        <span class="deco-char deco-1">ب</span>
        <span class="deco-char deco-2">ع</span>
        <span class="deco-char deco-3">م</span>
        <span class="deco-char deco-4">ل</span>
        <span class="deco-char deco-5">ق</span>
    </div>

    <!-- MAIN CONTENT — hanya kolom teks, tanpa kolom sidebar -->
    <div class="container main-container">
        <div class="teks-wrapper">
            <div class="teks-header">
                <span class="teks-badge">📖 Baca & Pahami</span>
                <p class="teks-hint">Klik kata untuk melihat artinya</p>
            </div>
            <main class="text-area teks-arab" id="containerTeks"></main>
        </div>
    </div>

    <!-- BACK BUTTON -->
    <div class="back-area text-center">
        <a href="/pages/akses.html" class="btn-back">
            <i class="bi bi-arrow-left-circle"></i> Kembali ke Daftar
        </a>
    </div>

    <footer class="site-footer">
        <p>Dibuat dengan ❤️ oleh <a href="https://www.instagram.com/titikarab/" class="footer-link">Titik Arab</a></p>
    </footer>

    <!-- =====================================================
         POPUP — diletakkan langsung di body, BUKAN di dalam
         Bootstrap column. Dengan begitu position:fixed
         bekerja 100% tanpa gangguan dari parent manapun.
    ====================================================== -->

    <!-- Backdrop mobile -->
    <div id="popupBackdrop" class="popup-backdrop"></div>

    <!-- Popup box -->
    <aside id="popup" class="popup-box">
        <div class="popup-idle" id="popupIdle">
            <div class="idle-icon">اضغط</div>
            <p class="idle-text">Ketuk sebuah kata<br>untuk melihat artinya</p>
        </div>
        <div class="popup-content" id="popupContent">
            <div class="popup-top">
                <h5 id="kataArab">اضغط على الكلمة</h5>
                <button class="popup-close" id="popupClose" aria-label="Tutup">✕</button>
            </div>
            <div class="popup-divider"></div>
            <div class="popup-arti-row">
                <span class="popup-label">Arti</span>
                <p id="arti">—</p>
            </div>
            <div class="popup-penjelasan-row">
                <span class="popup-label">Penjelasan</span>
                <p id="penjelasan">—</p>
            </div>
        </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.js.iife.js"></script>
    <script src="../script/teks.js"></script>
    <script>
        fetch("navbar.html")
            .then(res => res.text())
            .then(data => { document.getElementById("navbar").innerHTML = data; });
    </script>

</body>
</html>
