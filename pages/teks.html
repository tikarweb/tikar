<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Arab</title>

    <link rel="icon" type="image/png" href="../img/tamov1.png">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Alyamama&family=Amiri&family=Cairo+Play&family=Karla&display=swap" rel="stylesheet">

    <!-- DRIVER.JS CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/teks.css">
</head>

<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- MAIN CONTENT -->
    <div class="container mt-5 pt-4">
        <div class="row g-4">

            <!-- TEKS -->
            <div class="col-lg-8 col-12">
                <main class="text-area teks-arab" id="containerTeks"></main>
            </div>

            <!-- POPUP -->
            <div class="col-lg-4 col-12">
                <aside id="popup" class="popup-box card-kosakata">
                    <h5 id="kataArab">اضغط على الكلمة</h5>
                    <p id="arti">Arti kata akan muncul di sini.</p>
                    <p id="penjelasan">Penjelasan kosakata akan tampil setelah kata dipilih.</p>
                </aside>
            </div>

        </div>
    </div>

    <!-- BACK BUTTON -->
    <div class="text-center my-4">
        <a href="/pages/akses.html" class="btn btn-secondary">← Kembali</a>
    </div>

    <!-- FOOTER -->
    <footer class="text-black text-center p-2">
        <p>
            Created with ❤️ by
            <a href="https://www.instagram.com/titikarab/" class="fw-bold text-dark">
                Titik Arab
            </a>
        </p>
    </footer>

    <!-- DRIVER.JS -->
    <script src="https://cdn.jsdelivr.net/npm/driver.js@latest/dist/driver.js.iife.js"></script>

    <!-- SCRIPT UTAMA -->
    <script src="../script/teks.js"></script>

    <!-- LOAD NAVBAR -->
    <script>
        fetch("navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>

</body>
</html>
